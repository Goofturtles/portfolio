    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel" data-presets="env,react">
// intro.jsx — OceanX-inspired cinematic loader
// Sequence: black → percentage counter ticks 0→100 with shifting status text →
// at 100, headline reveals + curtain wipes up → site visible.

function Intro({ onDone }) {
  const [pct, setPct] = React.useState(0);
  const [phase, setPhase] = React.useState("loading"); // loading | reveal | done
  const startedRef = React.useRef(0);
  const skipRef = React.useRef(false);

  // Status texts cycle as percentage rises
  const statuses = [
    "Initializing atmospheric capture",
    "Calibrating MOF lattice",
    "Loading climate dataset",
    "Linking sensor mesh",
    "Synchronising ÆRIS network",
  ];
  const status = statuses[Math.min(statuses.length - 1, Math.floor(pct / 21))];

  // tick percent from 0 → 100 over ~3.2s with eased curve
  React.useEffect(() => {
    startedRef.current = performance.now();
    let raf = 0;
    const dur = 3200;
    const tick = (now) => {
      if (skipRef.current) {
        setPct(100);
        return;
      }
      const t = Math.min(1, (now - startedRef.current) / dur);
      // ease: starts fast, lulls in middle, surges at end (OceanX-ish)
      const eased = t < 0.7
        ? 1 - Math.pow(1 - t / 0.7, 2.4) * 0.85
        : 0.85 + (1 - 0.85) * Math.pow((t - 0.7) / 0.3, 0.6);
      const next = Math.floor(eased * 100);
      setPct((prev) => (next > prev ? next : prev));
      if (t < 1) raf = requestAnimationFrame(tick);
      else setPct(100);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  // when pct hits 100, hold a beat then enter reveal.
  // The reveal screen now PERSISTS as the title screen — user clicks/scrolls to dismiss.
  React.useEffect(() => {
    if (pct < 100) return;
    const t1 = setTimeout(() => setPhase("reveal"), 380);
    return () => { clearTimeout(t1); };
  }, [pct]);

  // Allow click/key to skip during loading; once on the title (reveal),
  // a click or scroll dismisses it and enters the site.
  React.useEffect(() => {
    const skip = () => { skipRef.current = true; };
    window.addEventListener("keydown", skip);
    window.addEventListener("click", skip);
    return () => {
      window.removeEventListener("keydown", skip);
      window.removeEventListener("click", skip);
    };
  }, []);

  // Once revealed, dismiss on user interaction (click / key / scroll / touch).
  // Two-step: enter "dismissing" to trigger CSS curtain wipes, then "done" to unmount.
  React.useEffect(() => {
    if (phase !== "reveal") return;
    let dismissed = false;
    const dismiss = () => {
      if (dismissed) return;
      dismissed = true;
      setPhase("dismissing");
      setTimeout(() => {
        setPhase("done");
        onDone && onDone();
      }, 1900);
    };
    window.addEventListener("click", dismiss);
    window.addEventListener("keydown", dismiss);
    window.addEventListener("wheel", dismiss, { passive: true });
    window.addEventListener("touchstart", dismiss, { passive: true });
    return () => {
      window.removeEventListener("click", dismiss);
      window.removeEventListener("keydown", dismiss);
      window.removeEventListener("wheel", dismiss);
      window.removeEventListener("touchstart", dismiss);
    };
  }, [phase, onDone]);

  // Lock body scroll while intro is active
  React.useEffect(() => {
    document.documentElement.style.overflow = "hidden";
    document.body.style.overflow = "hidden";
    return () => {
      document.documentElement.style.overflow = "";
      document.body.style.overflow = "";
    };
  }, []);

  React.useEffect(() => {
    if (phase === "done") {
      document.documentElement.style.overflow = "";
      document.body.style.overflow = "";
    } else if (phase === "reveal") {
      // Allow scrolling once we hit the title screen — a wheel event will dismiss it.
      // Keep body locked until then so the user can't scroll past the loader.
    }
  }, [phase]);

  if (phase === "done") return null;

  const reveal = phase === "reveal" || phase === "dismissing";
  const dismissing = phase === "dismissing";

  return (
    <div
      className={`intro ${reveal ? "intro--reveal" : ""} ${dismissing ? "intro--dismissing" : ""}`}
      aria-hidden={reveal}
    >
      {/* ambient noise + gradient layers */}
      <div className="intro__bg" />
      <div className="intro__grid" />
      <div className="intro__vignette" />

      {/* center brand mark */}
      <div className="intro__brand">
        <div className="intro__brandMark">Æ</div>
        <div className="intro__brandWord">ÆRIS</div>
      </div>

      {/* bottom counter + status */}
      <div className="intro__hud">
        <div className="intro__hudRow intro__hudRow--top">
          <span className="intro__hudKey">SYSTEM</span>
          <span className="intro__hudVal">ÆRIS / OS · v0.9.2</span>
        </div>

        <div className="intro__counter">
          <span className="intro__counterNum">{String(pct).padStart(3, "0")}</span>
          <span className="intro__counterUnit">%</span>
        </div>

        <div className="intro__bar">
          <div className="intro__barFill" style={{ width: `${pct}%` }} />
          <div className="intro__barTicks">
            {Array.from({ length: 21 }, (_, i) => (
              <span key={i} className="intro__barTick" />
            ))}
          </div>
        </div>

        <div className="intro__hudRow intro__hudRow--bot">
          <span className="intro__status">{status}</span>
          <span className="intro__hint">PRESS ANY KEY TO SKIP</span>
        </div>
      </div>

      {/* corner brackets */}
      <div className="intro__corner intro__corner--tl" />
      <div className="intro__corner intro__corner--tr" />
      <div className="intro__corner intro__corner--bl" />
      <div className="intro__corner intro__corner--br" />

      {/* reveal headline + tagline */}
      <div className={`intro__reveal ${reveal ? "is-on" : ""}`}>
        <div className="intro__revealKicker">— ATMOSPHERIC WATER · 2025</div>
        <h1 className="intro__revealHead">
          <span>DRINK</span>
          <span>THE</span>
          <span>SKY</span>
        </h1>
        <div className="intro__revealSub">An ÆRIS Water film &amp; product preview</div>
      </div>

      {/* curtain wipes — split horizontal panels */}
      <div className="intro__curtain intro__curtain--top" />
      <div className="intro__curtain intro__curtain--bot" />

      {/* hint that appears once the title is held — scroll/click to enter */}
      <div className="intro__dismissHint">
        <span>Scroll or click to enter</span>
        <span className="arrow" />
      </div>
    </div>
  );
}

window.Intro = Intro;

</script>

<script type="text/babel" data-presets="env,react">
// ambient-particles.jsx — page-wide drifting water motes
// Fixed-position canvas behind everything; pointer-events none.

function AmbientParticles() {
  const ref = React.useRef(null);

  React.useEffect(() => {
    const cvs = ref.current;
    if (!cvs) return;
    const ctx = cvs.getContext("2d");
    let w = 0, h = 0;
    let particles = [];
    let raf;
    let t = 0;

    const resize = () => {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      cvs.width = w * dpr; cvs.height = h * dpr;
      cvs.style.width = w + "px"; cvs.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      // particles count scales with viewport
      const target = Math.min(90, Math.floor((w * h) / 22000));
      particles = [];
      for (let i = 0; i < target; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: 0.5 + Math.random() * 1.6,
          vy: -(0.08 + Math.random() * 0.4),
          vx: (Math.random() - 0.5) * 0.05,
          phase: Math.random() * Math.PI * 2,
          seed: Math.random(),
          // depth — controls opacity & subtle blur look
          z: Math.random(),
        });
      }
    };
    resize();
    window.addEventListener("resize", resize);

    const tick = () => {
      t += 1 / 60;
      ctx.clearRect(0, 0, w, h);

      // Read accent + dark mode at draw time
      const accent = (getComputedStyle(document.documentElement)
        .getPropertyValue("--accent") || "#0071e3").trim();
      const dark = document.documentElement.dataset.theme === "dark";

      for (const p of particles) {
        p.y += p.vy;
        p.x += p.vx + Math.sin(t * 0.4 + p.phase) * 0.18;
        if (p.y < -8) { p.y = h + 8; p.x = Math.random() * w; }
        if (p.x < -8) p.x = w + 8;
        if (p.x > w + 8) p.x = -8;

        // Y-position influences color: top → soft white tint, bottom → accent blue
        const yT = p.y / h; // 0..1
        const baseAlpha = (0.05 + p.z * 0.18) * (dark ? 1.4 : 1);

        // glow halo
        const halo = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 6);
        halo.addColorStop(0, mixColor(accent, yT, baseAlpha * 0.6, dark));
        halo.addColorStop(1, mixColor(accent, yT, 0, dark));
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 6, 0, Math.PI * 2);
        ctx.fill();

        // core dot
        ctx.fillStyle = mixColor(accent, yT, baseAlpha * 2.2, dark);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }

      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", resize);
    };
  }, []);

  return (
    <canvas
      ref={ref}
      aria-hidden="true"
      style={{
        position: "fixed",
        inset: 0,
        width: "100%",
        height: "100%",
        pointerEvents: "none",
        zIndex: 1,
      }}
    />
  );
}

// Mix accent (blue) with white based on yT (0=top → white-leaning, 1=bottom → accent)
function mixColor(accent, yT, alpha, dark) {
  const a = hexToRgb(accent);
  // top color: white in light mode, very pale blue in dark
  const top = dark ? { r: 200, g: 220, b: 240 } : { r: 255, g: 255, b: 255 };
  // bottom color: accent
  const t = Math.max(0, Math.min(1, yT));
  const r = Math.round(top.r + (a.r - top.r) * t);
  const g = Math.round(top.g + (a.g - top.g) * t);
  const b = Math.round(top.b + (a.b - top.b) * t);
  return `rgba(${r},${g},${b},${alpha})`;
}

function hexToRgb(hex) {
  let s = hex.replace("#", "");
  if (s.length === 3) s = s.split("").map(x => x + x).join("");
  return {
    r: parseInt(s.slice(0, 2), 16),
    g: parseInt(s.slice(2, 4), 16),
    b: parseInt(s.slice(4, 6), 16),
  };
}

window.AmbientParticles = AmbientParticles;

</script>

<script type="text/babel" data-presets="env,react">
// section-water.jsx — small reusable water accents for various sections
// 1) <WaterDivider/>   — animated wavy line + ripples between sections
// 2) <SectionDrips/>   — subtle drips falling within a section background

function WaterDivider({ height = 60 }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const cvs = ref.current; if (!cvs) return;
    const ctx = cvs.getContext("2d");
    let w = 0, h = 0, t = 0, raf;
    const resize = () => {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = cvs.clientWidth; h = cvs.clientHeight;
      cvs.width = w * dpr; cvs.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    window.addEventListener("resize", resize);
    const tick = () => {
      t += 1 / 60;
      const acc = (getComputedStyle(document.documentElement).getPropertyValue("--accent") || "#0066d6").trim();
      ctx.clearRect(0, 0, w, h);
      // Three stacked waves
      for (let i = 0; i < 3; i++) {
        ctx.strokeStyle = withA(acc, 0.18 + i * 0.10);
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        for (let x = 0; x <= w; x += 4) {
          const y = h * 0.5
            + Math.sin(x * 0.020 + t * (1.0 + i * 0.4) + i) * (4 + i * 1.5)
            + Math.sin(x * 0.06 + t * 0.5 + i) * (1.5 + i * 0.4);
          if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", resize); };
  }, []);
  return (
    <div style={{ width: "100%", height, position: "relative", zIndex: 2 }}>
      <canvas ref={ref} style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }} />
    </div>
  );
}

// Falling drip accent — single droplet that periodically falls behind a section heading
function SectionDrips() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const cvs = ref.current; if (!cvs) return;
    const ctx = cvs.getContext("2d");
    let w = 0, h = 0, t = 0, raf;
    let drips = [];
    const resize = () => {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = cvs.clientWidth; h = cvs.clientHeight;
      cvs.width = w * dpr; cvs.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drips = [];
      const N = Math.max(3, Math.floor(w / 220));
      for (let i = 0; i < N; i++) {
        drips.push({
          x: (i + 0.5) * (w / N) + (Math.random() - 0.5) * 30,
          y: -20 - Math.random() * h,
          v: 0.7 + Math.random() * 1.2,
          r: 2 + Math.random() * 2,
          phase: Math.random(),
        });
      }
    };
    resize();
    window.addEventListener("resize", resize);
    const tick = () => {
      t += 1 / 60;
      const acc = (getComputedStyle(document.documentElement).getPropertyValue("--accent") || "#0066d6").trim();
      ctx.clearRect(0, 0, w, h);
      for (const d of drips) {
        d.y += d.v;
        if (d.y > h + 30) { d.y = -20; d.x = Math.random() * w; }
        // teardrop
        ctx.fillStyle = withA(acc, 0.45);
        ctx.beginPath();
        ctx.ellipse(d.x, d.y, d.r * 0.7, d.r * 1.3, 0, 0, Math.PI * 2);
        ctx.fill();
        // trail
        const grad = ctx.createLinearGradient(d.x, d.y - 18, d.x, d.y);
        grad.addColorStop(0, withA(acc, 0));
        grad.addColorStop(1, withA(acc, 0.30));
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(d.x, d.y - 18);
        ctx.lineTo(d.x, d.y);
        ctx.stroke();
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", resize); };
  }, []);
  return (
    <canvas ref={ref}
      aria-hidden="true"
      style={{ position: "absolute", inset: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 0 }}
    />
  );
}

// Counter ripple — pond-style concentric rings behind a centered number
function CounterRipple() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const cvs = ref.current; if (!cvs) return;
    const ctx = cvs.getContext("2d");
    let w = 0, h = 0, t = 0, raf;
    const resize = () => {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = cvs.clientWidth; h = cvs.clientHeight;
      cvs.width = w * dpr; cvs.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    window.addEventListener("resize", resize);
    const tick = () => {
      t += 1 / 60;
      const acc = (getComputedStyle(document.documentElement).getPropertyValue("--accent") || "#0066d6").trim();
      ctx.clearRect(0, 0, w, h);
      const cx = w / 2, cy = h / 2;
      // 6 expanding rings on a 4s loop, staggered
      for (let i = 0; i < 6; i++) {
        const phase = ((t * 0.25 + i / 6) % 1);
        const r = phase * Math.max(w, h) * 0.55;
        const a = (1 - phase) * 0.35;
        ctx.strokeStyle = withA(acc, a);
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.ellipse(cx, cy, r, r * 0.32, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", resize); };
  }, []);
  return (
    <canvas ref={ref}
      aria-hidden="true"
      style={{ position: "absolute", inset: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 0 }}
    />
  );
}

function withA(c, a) {
  let s = c.replace("#", "");
  if (s.length === 3) s = s.split("").map(x => x + x).join("");
  const r = parseInt(s.slice(0, 2), 16);
  const g = parseInt(s.slice(2, 4), 16);
  const b = parseInt(s.slice(4, 6), 16);
  return `rgba(${r},${g},${b},${a})`;
}

window.WaterDivider = WaterDivider;
window.SectionDrips = SectionDrips;
window.CounterRipple = CounterRipple;

</script>

<script type="text/babel" data-presets="env,react">
// hero-canvas.jsx — scroll-driven dramatic water droplet splash
// 3 phases driven by hero scroll progress (0..1):
//   0.00 .. 0.45  →  drop forms above and falls (stretching teardrop, motion blur trail)
//   0.45 .. 0.55  →  IMPACT (radial flash, crown spike-up)
//   0.55 .. 1.00  →  ripple rings expand on water surface; secondary droplets arc; surface settles

function HeroCanvas({ progress = 0, accent = "#0066d6", isDark = false }) {
  const ref = React.useRef(null);
  const stateRef = React.useRef({
    w: 0, h: 0, t: 0,
    secondaries: [],   // arc droplets thrown out at impact
    bubbles: [],       // tiny rising bubbles after impact
    initialized: false,
    lastImpactProg: -1,
  });

  const progRef = React.useRef(progress);
  progRef.current = progress;
  const accentRef = React.useRef(accent);
  accentRef.current = accent;
  const darkRef = React.useRef(isDark);
  darkRef.current = isDark;

  React.useEffect(() => {
    const cvs = ref.current;
    if (!cvs) return;
    const ctx = cvs.getContext("2d");
    const s = stateRef.current;

    const resize = () => {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const w = cvs.clientWidth, h = cvs.clientHeight;
      cvs.width = w * dpr; cvs.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      s.w = w; s.h = h;
    };
    resize();
    window.addEventListener("resize", resize);

    let raf;
    const tick = () => {
      const w = s.w, h = s.h;
      s.t += 1 / 60;
      const p = progRef.current;
      const acc = accentRef.current;
      const dark = darkRef.current;

      ctx.clearRect(0, 0, w, h);

      // ── Geometry ────────────────────────────────────────
      const cx = w * 0.5;
      const surfaceY = h * 0.78;          // water surface line
      const startY = h * 0.10;            // drop spawn
      const endY   = surfaceY;            // impact target
      const dropR  = Math.min(w, h) * 0.06;

      // Phase split
      const FALL_END = 0.50;
      const IMPACT_END = 0.58;

      // ── Water surface (always present — the "ground" being hit) ──
      drawSurface(ctx, w, h, surfaceY, acc, s.t, p, dark);

      // ── Phase 0: falling drop ───────────────────────────
      if (p < FALL_END) {
        const fT = p / FALL_END;        // 0..1
        // ease-in (gravity-ish)
        const ease = fT * fT;
        const y = startY + (endY - startY) * ease;
        // stretch increases with speed
        const speed = 2 * fT;
        const stretchY = 1 + Math.min(1.6, speed * 1.4);
        const stretchX = 1 / Math.sqrt(stretchY);

        // motion blur trail — series of fading drops above current pos
        for (let i = 6; i >= 1; i--) {
          const tY = y - i * dropR * 0.55 * stretchY * 0.4;
          if (tY < startY - 20) continue;
          const a = (1 - i / 6) * 0.18;
          drawDroplet(ctx, cx, tY, dropR * stretchX * 0.85, dropR * stretchY * 0.85, acc, a);
        }
        // main drop
        drawDroplet(ctx, cx, y, dropR * stretchX, dropR * stretchY, acc, 1);

        // anticipation glow on water below the drop (grows as drop approaches)
        const antT = Math.pow(fT, 3);
        if (antT > 0.05) {
          const grad = ctx.createRadialGradient(cx, surfaceY, 0, cx, surfaceY, w * 0.18 * antT);
          grad.addColorStop(0, withA(acc, 0.4 * antT));
          grad.addColorStop(1, withA(acc, 0));
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, w, h);
        }

        // reset bookkeeping if user scrolls back
        s.lastImpactProg = -1;
        s.secondaries.length = 0;
        s.bubbles.length = 0;
      }

      // ── Phase 1: IMPACT ─────────────────────────────────
      if (p >= FALL_END && p < IMPACT_END) {
        const iT = (p - FALL_END) / (IMPACT_END - FALL_END);  // 0..1

        // Spawn secondaries + bubbles once
        if (s.lastImpactProg < FALL_END) {
          spawnImpact(s, cx, surfaceY, dropR);
          s.lastImpactProg = FALL_END;
        }

        // White flash + radial shock
        const flashA = (1 - iT) * 0.55;
        const flash = ctx.createRadialGradient(cx, surfaceY, 0, cx, surfaceY, Math.max(w, h) * 0.5);
        flash.addColorStop(0, `rgba(255,255,255,${flashA})`);
        flash.addColorStop(0.4, withA(acc, flashA * 0.5));
        flash.addColorStop(1, withA(acc, 0));
        ctx.fillStyle = flash;
        ctx.fillRect(0, 0, w, h);

        // Crown — narrow vertical spike of water rising from impact then collapsing
        const crownH = (Math.sin(iT * Math.PI)) * dropR * 3.4;
        if (crownH > 1) {
          ctx.save();
          ctx.translate(cx, surfaceY);
          // central jet
          const jetGrad = ctx.createLinearGradient(0, 0, 0, -crownH);
          jetGrad.addColorStop(0, withA(acc, 0.85));
          jetGrad.addColorStop(1, withA(acc, 0));
          ctx.fillStyle = jetGrad;
          ctx.beginPath();
          ctx.moveTo(-dropR * 0.45, 0);
          ctx.quadraticCurveTo(0, -crownH * 0.7, 0, -crownH);
          ctx.quadraticCurveTo(0, -crownH * 0.7, dropR * 0.45, 0);
          ctx.closePath();
          ctx.fill();
          // little tip droplet
          ctx.fillStyle = withA(acc, 0.95);
          ctx.beginPath();
          ctx.ellipse(0, -crownH - dropR * 0.25, dropR * 0.22, dropR * 0.34, 0, 0, Math.PI * 2);
          ctx.fill();
          // crown petals (3 short curls each side)
          ctx.strokeStyle = withA(acc, 0.6);
          ctx.lineWidth = 1.4;
          for (let i = -1; i <= 1; i += 2) {
            for (let k = 0; k < 3; k++) {
              const r = dropR * (0.5 + k * 0.7);
              ctx.beginPath();
              ctx.moveTo(0, 0);
              ctx.quadraticCurveTo(i * r * 0.6, -crownH * (0.45 - k * 0.1), i * r * 1.1, -crownH * (0.18 - k * 0.05));
              ctx.stroke();
            }
          }
          ctx.restore();
        }

        // Update + draw secondaries (just spawned)
        updateAndDrawSecondaries(ctx, s, surfaceY, acc);
        // initial ring during impact
        drawImpactRing(ctx, cx, surfaceY, w * 0.05 + iT * w * 0.18, 1 - iT, acc);
      }

      // ── Phase 2: ripple aftermath ───────────────────────
      if (p >= IMPACT_END) {
        const rT = (p - IMPACT_END) / (1 - IMPACT_END);   // 0..1
        // 4 expanding ripples staggered
        const rings = 5;
        for (let i = 0; i < rings; i++) {
          const off = i * 0.16;
          const t = Math.max(0, rT - off);
          if (t <= 0) continue;
          const r = w * (0.05 + t * 0.55);
          const a = (1 - Math.min(1, t)) * 0.55;
          drawImpactRing(ctx, cx, surfaceY, r, a, acc);
        }
        // settling jet remnant
        const jetH = Math.max(0, (1 - rT * 2) * dropR * 1.2);
        if (jetH > 1) {
          ctx.fillStyle = withA(acc, 0.6);
          ctx.beginPath();
          ctx.ellipse(cx, surfaceY - jetH, dropR * 0.18, jetH * 0.6, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        // Update + draw secondaries (still in flight / settling)
        updateAndDrawSecondaries(ctx, s, surfaceY, acc);

        // Bubbles rising under surface
        for (const b of s.bubbles) {
          b.y -= b.vy;
          b.x += Math.sin(s.t * 1.4 + b.phase) * 0.3;
          b.life += 1 / 60;
          if (b.life > b.maxLife) continue;
          const a = (1 - b.life / b.maxLife) * 0.6;
          ctx.strokeStyle = withA(acc, a);
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", resize);
    };
  }, []);

  return <canvas ref={ref} className="hero-canvas" style={{ display: "block" }} />;
}

// ── Helpers ───────────────────────────────────────────────────────────────

function drawSurface(ctx, w, h, surfaceY, acc, t, p, dark) {
  // Deep underwater volume — dark gradient with depth
  const deepGrad = ctx.createLinearGradient(0, surfaceY, 0, h);
  deepGrad.addColorStop(0, withA(acc, 0.35));
  deepGrad.addColorStop(0.5, withA(acc, 0.18));
  deepGrad.addColorStop(1, "rgba(0,40,80,0.4)");
  ctx.fillStyle = deepGrad;
  ctx.fillRect(0, surfaceY, w, h - surfaceY);

  // Animated caustics (light patterns shimmering through water)
  ctx.save();
  ctx.globalCompositeOperation = "screen";
  for (let i = 0; i < 5; i++) {
    const cx = w * (0.15 + i * 0.18) + Math.sin(t * 0.6 + i) * 30;
    const cy = surfaceY + 30 + (i % 2) * 24;
    const cR = 60 + Math.sin(t * 1.1 + i) * 18;
    const causticGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, cR);
    causticGrad.addColorStop(0, "rgba(180,220,255,0.16)");
    causticGrad.addColorStop(0.5, "rgba(120,180,240,0.08)");
    causticGrad.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = causticGrad;
    ctx.beginPath(); ctx.arc(cx, cy, cR, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();

  // Surface line — multi-frequency wave
  ctx.lineWidth = 1.4;
  // White highlight wave (top of surface meniscus)
  ctx.strokeStyle = "rgba(255,255,255,0.5)";
  ctx.beginPath();
  for (let x = 0; x <= w; x += 4) {
    const wobble = Math.sin(x * 0.018 + t * 1.4) * 1.4 + Math.sin(x * 0.06 + t * 0.6) * 0.6 + Math.sin(x * 0.13 + t * 2.1) * 0.3;
    const impactBoost = Math.max(0, p - 0.45) * 4;
    const y = surfaceY + wobble * (1 + impactBoost) - 1;
    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  // Dark refractive surface line
  ctx.strokeStyle = withA(acc, 0.7);
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x <= w; x += 4) {
    const wobble = Math.sin(x * 0.018 + t * 1.4) * 1.4 + Math.sin(x * 0.06 + t * 0.6) * 0.6 + Math.sin(x * 0.13 + t * 2.1) * 0.3;
    const impactBoost = Math.max(0, p - 0.45) * 4;
    const y = surfaceY + wobble * (1 + impactBoost);
    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Specular glints — bright reflection points where waves catch the light
  for (let i = 0; i < 14; i++) {
    const gx = (i / 13) * w + Math.sin(t * 0.5 + i * 0.7) * 18;
    const gy = surfaceY + 4 + Math.sin(t * 0.8 + i) * 1.4;
    const glintR = 22 + Math.sin(t * 1.3 + i * 0.5) * 8;
    const a = 0.22 + Math.sin(t * 0.9 + i * 0.4) * 0.12;
    const grad = ctx.createLinearGradient(gx - glintR, gy, gx + glintR, gy);
    grad.addColorStop(0, "rgba(255,255,255,0)");
    grad.addColorStop(0.5, `rgba(255,255,255,${a})`);
    grad.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(gx, gy, glintR, 0.8, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawDroplet(ctx, cx, cy, rx, ry, acc, alpha = 1) {
  ctx.save();
  ctx.globalAlpha *= alpha;

  // Drop body — multi-layered for photorealism

  // 1. Soft drop shadow / volume below
  ctx.save();
  ctx.fillStyle = "rgba(0,30,60,0.18)";
  ctx.beginPath();
  ctx.ellipse(cx, cy + ry * 0.2, rx * 0.95, ry * 1.05, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 2. Refractive "dark ring" — water tends to look darker at the edges (Fresnel)
  const edgeGrad = ctx.createRadialGradient(cx, cy, Math.max(rx, ry) * 0.55, cx, cy, Math.max(rx, ry) * 1.05);
  edgeGrad.addColorStop(0, withA(acc, 0.0));
  edgeGrad.addColorStop(0.7, withA(acc, 0.5));
  edgeGrad.addColorStop(1, "rgba(0,30,80,0.95)");
  ctx.fillStyle = edgeGrad;
  ctx.beginPath();
  ctx.moveTo(cx, cy - ry);
  ctx.bezierCurveTo(cx + rx * 0.85, cy - ry * 0.4, cx + rx, cy + ry * 0.45, cx, cy + ry);
  ctx.bezierCurveTo(cx - rx, cy + ry * 0.45, cx - rx * 0.85, cy - ry * 0.4, cx, cy - ry);
  ctx.closePath();
  ctx.fill();

  // 3. Inner body — light passing through
  const bodyGrad = ctx.createRadialGradient(
    cx - rx * 0.25, cy - ry * 0.15, rx * 0.05,
    cx, cy, Math.max(rx, ry) * 0.85
  );
  bodyGrad.addColorStop(0, "rgba(255,255,255,0.85)");
  bodyGrad.addColorStop(0.18, withA(acc, 0.45));
  bodyGrad.addColorStop(0.55, withA(acc, 0.75));
  bodyGrad.addColorStop(1, withA(acc, 0.55));
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(cx, cy - ry * 0.96);
  ctx.bezierCurveTo(cx + rx * 0.82, cy - ry * 0.4, cx + rx * 0.96, cy + ry * 0.42, cx, cy + ry * 0.96);
  ctx.bezierCurveTo(cx - rx * 0.96, cy + ry * 0.42, cx - rx * 0.82, cy - ry * 0.4, cx, cy - ry * 0.96);
  ctx.closePath();
  ctx.fill();

  // 4. Caustic "lens" bright spot bottom-right (light refracted through water)
  const causticGrad = ctx.createRadialGradient(
    cx + rx * 0.3, cy + ry * 0.35, 0,
    cx + rx * 0.3, cy + ry * 0.35, rx * 0.45
  );
  causticGrad.addColorStop(0, "rgba(255,255,255,0.75)");
  causticGrad.addColorStop(0.4, "rgba(200,230,255,0.35)");
  causticGrad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = causticGrad;
  ctx.beginPath();
  ctx.ellipse(cx + rx * 0.3, cy + ry * 0.35, rx * 0.45, ry * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();

  // 5. Primary specular highlight — sharp, top-left
  const hlGrad = ctx.createRadialGradient(
    cx - rx * 0.4, cy - ry * 0.42, 0,
    cx - rx * 0.4, cy - ry * 0.42, rx * 0.5
  );
  hlGrad.addColorStop(0, "rgba(255,255,255,1)");
  hlGrad.addColorStop(0.3, "rgba(255,255,255,0.7)");
  hlGrad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = hlGrad;
  ctx.beginPath();
  ctx.ellipse(cx - rx * 0.4, cy - ry * 0.42, rx * 0.32, ry * 0.18, -0.6, 0, Math.PI * 2);
  ctx.fill();

  // 6. Secondary tiny highlight — pin sharpness
  ctx.fillStyle = "rgba(255,255,255,1)";
  ctx.beginPath();
  ctx.ellipse(cx - rx * 0.45, cy - ry * 0.55, rx * 0.10, ry * 0.05, -0.5, 0, Math.PI * 2);
  ctx.fill();

  // 7. Crisp rim (Fresnel reflection at glancing angle)
  ctx.strokeStyle = "rgba(255,255,255,0.55)";
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(cx, cy - ry);
  ctx.bezierCurveTo(cx + rx * 0.85, cy - ry * 0.4, cx + rx, cy + ry * 0.45, cx, cy + ry);
  ctx.bezierCurveTo(cx - rx, cy + ry * 0.45, cx - rx * 0.85, cy - ry * 0.4, cx, cy - ry);
  ctx.closePath();
  ctx.stroke();

  // 8. Outer subtle dark line (refraction edge)
  ctx.strokeStyle = withA(acc, 0.45);
  ctx.lineWidth = 0.5;
  ctx.stroke();

  ctx.restore();
}

function drawImpactRing(ctx, cx, cy, r, a, acc) {
  if (r < 4 || a <= 0) return;
  ctx.strokeStyle = withA(acc, a * 0.7);
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.ellipse(cx, cy, r, r * 0.18, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.strokeStyle = withA(acc, a * 0.3);
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.ellipse(cx, cy, r * 1.15, r * 0.20, 0, 0, Math.PI * 2);
  ctx.stroke();
}

function spawnImpact(s, cx, surfaceY, dropR) {
  s.secondaries.length = 0;
  s.bubbles.length = 0;
  // Secondaries: fan of droplets thrown laterally + slightly up
  const N = 14;
  for (let i = 0; i < N; i++) {
    const ang = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.85;
    const speed = 2.5 + Math.random() * 4.5;
    s.secondaries.push({
      x: cx, y: surfaceY,
      vx: Math.cos(ang) * speed * (Math.random() < 0.5 ? -1 : 1) * 0.6 + (Math.random() - 0.5) * 1.2,
      vy: Math.sin(ang) * speed,
      r: dropR * (0.16 + Math.random() * 0.18),
      gravity: 0.18 + Math.random() * 0.06,
      life: 0,
    });
  }
  // Bubbles
  for (let i = 0; i < 12; i++) {
    s.bubbles.push({
      x: cx + (Math.random() - 0.5) * dropR * 4,
      y: surfaceY + Math.random() * 30,
      r: 1 + Math.random() * 2,
      vy: 0.3 + Math.random() * 0.5,
      phase: Math.random() * Math.PI * 2,
      life: 0,
      maxLife: 1.5 + Math.random() * 1.5,
    });
  }
}

function updateAndDrawSecondaries(ctx, s, surfaceY, acc) {
  for (let i = s.secondaries.length - 1; i >= 0; i--) {
    const d = s.secondaries[i];
    d.x += d.vx;
    d.y += d.vy;
    d.vy += d.gravity;
    d.life += 1 / 60;
    if (d.y > surfaceY + 10 || d.life > 3) {
      // landed → mini ripple? remove for now
      s.secondaries.splice(i, 1);
      continue;
    }
    // teardrop oriented along velocity
    const ang = Math.atan2(d.vy, d.vx) + Math.PI / 2;
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(ang);
    const grad = ctx.createRadialGradient(-d.r * 0.3, -d.r * 0.3, 0, 0, 0, d.r);
    grad.addColorStop(0, withA(acc, 0.55));
    grad.addColorStop(1, withA(acc, 0.95));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, d.r * 0.7, d.r * 1.1, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = withA(acc, 0.7);
    ctx.lineWidth = 0.6;
    ctx.stroke();
    ctx.restore();
  }
}

function withA(c, a) {
  let s = c.replace("#", "");
  if (s.length === 3) s = s.split("").map(x => x + x).join("");
  const r = parseInt(s.slice(0, 2), 16);
  const g = parseInt(s.slice(2, 4), 16);
  const b = parseInt(s.slice(4, 6), 16);
  return `rgba(${r},${g},${b},${a})`;
}

window.HeroCanvas = HeroCanvas;

</script>

<script type="text/babel" data-presets="env,react">
// hero-water.jsx — faithful port of uploads/water-736d1fc7.html into a React
// component, with hero-context adaptations:
//
//   • Auto-emits splashes / Worthington jets / lightning so the surface lives
//     on its own (no pointer interaction — would fight page scroll).
//   • Scroll-driven camera: reads the `progress` prop (0..1 over the hero's
//     pinned scroll). Slow drift between two key angles, so swell appears to
//     flow past the camera as the user scrolls.
//   • Foam textures synthesized procedurally on a canvas (the original loaded

uniform mat4 u_viewProjection;

      // ============================================================

      function compile(src, type){

      function buildQuadVAO(){

        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
        gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
        const indices=new Uint32Array((N-1)*(N-1)*6); let i=0;

          const tl=z*N+x,tr=tl+1,bl=tl+N,br=bl+1;
          indices[i++]=tl; indices[i++]=bl; indices[i++]=tr;
          indices[i++]=tr; indices[i++]=bl; indices[i++]=br;

          const offset = positions.length / 2;
          for (let zi=0; zi<nz; zi++){
            const z = z0 + (z1-z0) * zi/(nz-1);
            for (let xi=0; xi<nx; xi++){
              const x = x0 + (x1-x0) * xi/(nx-1);
              positions.push(x, z);
            }
          }
          for (let zi=0; zi<nz-1; zi++) for (let xi=0; xi<nx-1; xi++){
            const tl = offset + zi*nx + xi, tr = tl + 1;
            const bl = tl + nx, br = bl + 1;
            indices.push(tl, bl, tr, tr, bl, br);
          }

        addStrip(-1, 1, -S, -1, 200, 120);  // S
        addStrip(1, S, -S, S,   120, 240);  // E
        addStrip(-S, -1, -S, S, 120, 240);  // W

        gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());

        gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, gl.createBuffer());
